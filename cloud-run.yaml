apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: canvas-mcp
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 100
      timeoutSeconds: 300
      containers:
        - image: gcr.io/victor-adf28/canvas-mcp:latest
          ports:
            - containerPort: 3000
          env:
            - name: MCP_TRANSPORT
              value: "http"
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "3000"
            - name: MCP_PATH
              value: "/mcp"
            - name: ANALYTICS_ENABLED
              value: "true"
            - name: POSTHOG_HOST
              value: "https://us.i.posthog.com"
            - name: ENCRYPTION_SECRET
              valueFrom:
                secretKeyRef:
                  name: ENCRYPTION_SECRET
                  key: latest
            - name: POSTHOG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: POSTHOG_API_KEY
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /mcp
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /mcp
              port: 3000
            periodSeconds: 30
            timeoutSeconds: 10
